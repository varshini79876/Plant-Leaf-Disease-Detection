<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}LeafScan — Plant Disease Detection{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ── CSS VARIABLES ──────────────────────────────────────────── */
    :root {
      --g-dark:    #1a3a2a;
      --g-mid:     #2d6a4f;
      --g-bright:  #52b788;
      --g-light:   #b7e4c7;
      --g-pale:    #d8f3dc;
      --cream:     #f8f5ee;
      --amber:     #e9a84c;
      --red:       #c1440e;
      --text:      #1c1c1c;
      --muted:     #6b7280;
      --sh-sm:     0 2px 8px  rgba(26,58,42,.12);
      --sh-md:     0 8px 32px rgba(26,58,42,.16);
      --sh-lg:     0 20px 60px rgba(26,58,42,.20);
      --r:         14px;
      --r-sm:      8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ────────────────────────────────────────────────────── */
    nav {
      background: var(--g-dark);
      height: 66px;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 20px rgba(0,0,0,.3);
    }
    .brand { display:flex; align-items:center; gap:.65rem; text-decoration:none; }
    .brand-icon {
      width:38px; height:38px; min-width:38px;
      background: var(--g-bright);
      border-radius: 10px;
      display:flex; align-items:center; justify-content:center;
      font-size:1.1rem; color: var(--g-dark);
    }
    .brand-name {
      font-family:'Playfair Display',serif;
      font-size:1.4rem; font-weight:700;
      color:#fff; letter-spacing:-.4px;
    }
    .brand-name span { color: var(--g-bright); }
    .nav-links { display:flex; gap:.2rem; list-style:none; }
    .nav-links a {
      color:rgba(255,255,255,.72);
      text-decoration:none; font-weight:500; font-size:.88rem;
      padding:.45rem .9rem; border-radius:var(--r-sm);
      transition: all .2s;
      display:flex; align-items:center; gap:.4rem;
    }
    .nav-links a:hover, .nav-links a.active {
      background:rgba(255,255,255,.1); color:#fff;
    }

    /* ── LAYOUT ─────────────────────────────────────────────────── */
    main { flex:1; }

    .container { max-width:1100px; margin:0 auto; padding:0 1.5rem; }

    /* ── FOOTER ─────────────────────────────────────────────────── */
    footer {
      background: var(--g-dark);
      color:rgba(255,255,255,.45);
      text-align:center;
      padding:1.4rem 2rem;
      font-size:.8rem;
    }
    footer a { color: var(--g-bright); text-decoration:none; }

    /* ── BADGES ─────────────────────────────────────────────────── */
    .badge {
      display:inline-flex; align-items:center; gap:.3rem;
      padding:.22rem .68rem; border-radius:999px;
      font-size:.73rem; font-weight:700;
      letter-spacing:.5px; text-transform:uppercase;
    }
    .b-healthy   { background:var(--g-pale);  color:var(--g-mid); }
    .b-diseased  { background:#fde8e0;         color:var(--red); }
    .b-none      { background:var(--g-pale);  color:var(--g-mid); }
    .b-low       { background:var(--g-pale);  color:var(--g-mid); }
    .b-moderate  { background:#fef3cd;         color:#92610a; }
    .b-high      { background:#fde8e0;         color:var(--red); }
    .b-very-high { background:#f8d7da;         color:#7a0c1d; }

    /* ── BUTTONS ────────────────────────────────────────────────── */
    .btn {
      display:inline-flex; align-items:center; gap:.5rem;
      padding:.7rem 1.5rem; border-radius:var(--r-sm);
      font-family:'DM Sans',sans-serif;
      font-size:.9rem; font-weight:600;
      cursor:pointer; border:none;
      transition: all .2s; text-decoration:none;
    }
    .btn-primary {
      background:var(--g-mid); color:#fff;
    }
    .btn-primary:hover {
      background:var(--g-dark);
      transform:translateY(-1px); box-shadow:var(--sh-sm);
    }
    .btn-outline {
      background:transparent; color:var(--g-mid);
      border:2px solid var(--g-mid);
    }
    .btn-outline:hover { background:var(--g-pale); }

    /* ── HEADINGS ───────────────────────────────────────────────── */
    .sec-title {
      font-family:'Playfair Display',serif;
      font-size:2rem; color:var(--g-dark); margin-bottom:.4rem;
    }
    .sec-sub { color:var(--muted); font-size:.92rem; margin-bottom:2rem; }

    /* ── CARD ───────────────────────────────────────────────────── */
    .card {
      background:#fff; border-radius:var(--r);
      box-shadow:var(--sh-sm); overflow:hidden;
      transition: box-shadow .2s, transform .2s;
    }
    .card:hover { box-shadow:var(--sh-md); transform:translateY(-2px); }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

<nav>
  <a href="{% url 'index' %}" class="brand">
    <div class="brand-icon"><i class="fas fa-leaf"></i></div>
    <span class="brand-name">Leaf<span>Scan</span></span>
  </a>
  <ul class="nav-links">
    <li><a href="{% url 'index' %}"   {% if request.resolver_match.url_name == 'index'   %}class="active"{% endif %}><i class="fas fa-home"></i> Home</a></li>
    <li><a href="{% url 'history' %}" {% if request.resolver_match.url_name == 'history' %}class="active"{% endif %}><i class="fas fa-history"></i> History</a></li>
    <li><a href="{% url 'about' %}"   {% if request.resolver_match.url_name == 'about'   %}class="active"{% endif %}><i class="fas fa-info-circle"></i> About</a></li>
  </ul>
</nav>

<main>{% block content %}{% endblock %}</main>

<footer>
  <p>
    LeafScan — Plant Leaf Disease Detection System &nbsp;|&nbsp;
    Dataset: <a href="https://www.kaggle.com/datasets/vipoooool/new-plant-diseases-dataset" target="_blank">New Plant Diseases Dataset</a>
    &nbsp;|&nbsp; Built with Django &amp; TensorFlow
  </p>
</footer>

</body>
</html>
